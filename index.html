<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schooltoets Oefenapp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- PIN overlay -->
    <div id="pin-overlay" class="pin-overlay hidden">
      <div class="pin-modal">
        <div id="pin-profile-emoji" class="pin-emoji"></div>
        <h3 id="pin-title">Pincode invoeren</h3>
        <div class="pin-dots" id="pin-dots">
          <span class="pin-dot"></span><span class="pin-dot"></span>
          <span class="pin-dot"></span><span class="pin-dot"></span>
        </div>
        <p id="pin-error" class="pin-error hidden">Verkeerde pincode, probeer opnieuw</p>
        <div class="pin-keypad">
          <button class="pin-key" data-val="1">1</button>
          <button class="pin-key" data-val="2">2</button>
          <button class="pin-key" data-val="3">3</button>
          <button class="pin-key" data-val="4">4</button>
          <button class="pin-key" data-val="5">5</button>
          <button class="pin-key" data-val="6">6</button>
          <button class="pin-key" data-val="7">7</button>
          <button class="pin-key" data-val="8">8</button>
          <button class="pin-key" data-val="9">9</button>
          <button class="pin-key pin-key-cancel" id="btn-pin-cancel">✕</button>
          <button class="pin-key" data-val="0">0</button>
          <button class="pin-key pin-key-del" id="btn-pin-del">⌫</button>
        </div>
      </div>
    </div>

    <!-- Profile select -->
    <div id="screen-profiles" class="screen active">
      <header>
        <h1>📚 Schooltoets Oefenapp</h1>
        <p class="subtitle">Wie oefent er vandaag?</p>
      </header>
      <div id="profile-grid" class="profile-grid"></div>
      <div style="text-align:center;margin-top:16px">
        <button id="btn-add-profile" class="btn btn-secondary">+ Profiel toevoegen</button>
      </div>
    </div>

    <!-- Add profile -->
    <div id="screen-add-profile" class="screen">
      <header class="sub-header">
        <button id="btn-back-add-profile" class="btn btn-ghost">← Terug</button>
        <h2>Nieuw profiel</h2>
      </header>
      <div class="manage-container">
        <div class="manage-section">
          <div class="form-col">
            <input id="new-profile-name" type="text" placeholder="Naam (bijv. Niek)" class="input">
            <input id="new-profile-emoji" type="text" placeholder="Emoji avatar (bijv. 👦)" class="input">
            <label class="checkbox-row">
              <input type="checkbox" id="new-profile-is-parent">
              <span>Ouderprofiel (met pincodebeveiliging)</span>
            </label>
            <div id="new-profile-pin-wrap" class="hidden">
              <input id="new-profile-pin" type="password" inputmode="numeric" maxlength="4"
                     placeholder="Pincode (4 cijfers)" class="input">
            </div>
            <button id="btn-create-profile" class="btn btn-primary">Aanmaken</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Home -->
    <div id="screen-home" class="screen">
      <header class="home-header">
        <button id="btn-switch-profile" class="btn btn-ghost btn-sm">↩ Wisselen</button>
        <div id="home-profile-badge" class="home-profile-badge"></div>
        <button id="btn-parent-dashboard" class="btn btn-ghost btn-sm hidden">📊 Resultaten</button>
      </header>
      <div id="subject-grid" class="subject-grid"></div>
      <footer>
        <button id="btn-manage" class="btn btn-secondary">⚙️ Vragen beheren</button>
      </footer>
    </div>

    <!-- Parent dashboard -->
    <div id="screen-parent" class="screen">
      <header class="sub-header">
        <button id="btn-back-parent" class="btn btn-ghost">← Terug</button>
        <h2>📊 Resultaten overzicht</h2>
      </header>
      <div id="parent-content" class="parent-content"></div>
    </div>

    <!-- Mode select -->
    <div id="screen-mode" class="screen">
      <header class="sub-header">
        <button id="btn-back-mode" class="btn btn-ghost">← Terug</button>
        <div id="mode-subject-heading"></div>
      </header>
      <div class="mode-grid">
        <button class="mode-card" id="btn-mode-flashcard">
          <span class="mode-icon">🃏</span>
          <span class="mode-name">Flashcards</span>
          <span class="mode-desc">Woordjes oefenen door omdraaien</span>
        </button>
        <button class="mode-card" id="btn-mode-typing">
          <span class="mode-icon">✏️</span>
          <span class="mode-name">Typen</span>
          <span class="mode-desc">Antwoorden invullen</span>
        </button>
        <button class="mode-card" id="btn-mode-quiz">
          <span class="mode-icon">📝</span>
          <span class="mode-name">Quiz</span>
          <span class="mode-desc">Gemengde vragen (MC + open)</span>
        </button>
      </div>
      <div id="mode-progress-overview" class="mode-progress-overview"></div>
    </div>

    <!-- Flashcard -->
    <div id="screen-flashcard" class="screen">
      <header class="quiz-header">
        <button id="btn-back-flashcard" class="btn btn-ghost">← Stop</button>
        <div class="quiz-meta">
          <span id="fc-subject-title"></span>
          <span id="fc-progress"></span>
        </div>
        <div id="fc-known-count"></div>
      </header>
      <div class="progress-bar-container">
        <div id="fc-progress-bar" class="progress-bar"></div>
      </div>
      <div class="flashcard-area">
        <div id="flashcard" class="flashcard" role="button" tabindex="0">
          <div class="flashcard-inner">
            <div class="flashcard-front" id="fc-front"></div>
            <div class="flashcard-back" id="fc-back"></div>
          </div>
        </div>
        <p id="fc-tap-hint" class="fc-tap-hint">👆 Tik op de kaart om het antwoord te zien</p>
      </div>
      <div class="fc-actions">
        <button id="btn-fc-wrong" class="btn btn-fc-wrong hidden">❌ Nog niet geweten</button>
        <button id="btn-fc-correct" class="btn btn-fc-correct hidden">✅ Kende ik!</button>
      </div>
    </div>

    <!-- Quiz -->
    <div id="screen-quiz" class="screen">
      <header class="quiz-header">
        <button id="btn-back-quiz" class="btn btn-ghost">← Terug</button>
        <div class="quiz-meta">
          <span id="quiz-subject-title"></span>
          <span id="quiz-progress"></span>
        </div>
        <div id="score-display"></div>
      </header>
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <main id="question-area" class="question-area"></main>
      <div id="feedback-area" class="feedback-area hidden"></div>
      <div class="quiz-actions">
        <button id="btn-retry-answer" class="btn btn-warning hidden">🔄 Nog een kans</button>
        <button id="btn-check" class="btn btn-primary">Controleer</button>
        <button id="btn-next" class="btn btn-primary hidden">Volgende →</button>
      </div>
    </div>

    <!-- Results -->
    <div id="screen-results" class="screen">
      <div class="results-container">
        <div id="results-emoji" class="results-emoji"></div>
        <h2 id="results-title">Klaar!</h2>
        <div id="results-score" class="results-score"></div>
        <div id="results-breakdown" class="results-breakdown"></div>
        <div class="results-actions">
          <button id="btn-retry" class="btn btn-primary">🔄 Opnieuw</button>
          <button id="btn-home-results" class="btn btn-secondary">🏠 Hoofdmenu</button>
        </div>
      </div>
    </div>

    <!-- Subject view (parent read-only) -->
    <div id="screen-subject-view" class="screen">
      <header class="sub-header">
        <button id="btn-back-subject-view" class="btn btn-ghost">← Terug</button>
        <div id="subject-view-heading"></div>
      </header>
      <div id="subject-view-content" class="subject-view-content"></div>
    </div>

    <!-- Manage -->
    <div id="screen-manage" class="screen">
      <header class="sub-header">
        <button id="btn-back-manage" class="btn btn-ghost">← Terug</button>
        <h2>Vragen beheren</h2>
      </header>
      <div class="manage-container">
        <div class="manage-section">
          <h3>Vak toevoegen</h3>
          <div class="form-row">
            <input id="new-subject-name" type="text" placeholder="Vaknaam" class="input">
            <input id="new-subject-emoji" type="text" placeholder="Emoji" class="input input-emoji">
            <button id="btn-add-subject" class="btn btn-primary">Toevoegen</button>
          </div>
        </div>
        <div class="manage-section">
          <h3>Vraag toevoegen</h3>
          <div class="form-col">
            <select id="q-subject" class="input"></select>
            <select id="q-type" class="input">
              <option value="mc">Meerkeuze</option>
              <option value="open">Open vraag / Woordje</option>
              <option value="truefalse">Waar / Niet waar</option>
            </select>
            <input id="q-question" type="text" placeholder="Vraag" class="input">
            <div id="mc-options">
              <input id="q-opt-a" type="text" placeholder="Optie A" class="input">
              <input id="q-opt-b" type="text" placeholder="Optie B" class="input">
              <input id="q-opt-c" type="text" placeholder="Optie C" class="input">
              <input id="q-opt-d" type="text" placeholder="Optie D" class="input">
              <select id="q-correct" class="input">
                <option value="0">Correct: A</option><option value="1">Correct: B</option>
                <option value="2">Correct: C</option><option value="3">Correct: D</option>
              </select>
            </div>
            <div id="open-options" class="hidden">
              <input id="q-answer" type="text" placeholder="Correct antwoord" class="input">
              <input id="q-alt-answers" type="text" placeholder="Alternatieve antwoorden (komma gescheiden)" class="input">
            </div>
            <div id="tf-options" class="hidden">
              <select id="q-tf-answer" class="input">
                <option value="true">Antwoord: Waar</option>
                <option value="false">Antwoord: Niet waar</option>
              </select>
            </div>
            <button id="btn-add-question" class="btn btn-primary">Vraag toevoegen</button>
          </div>
        </div>
        <div class="manage-section">
          <h3>Importeer / Exporteer</h3>
          <div class="form-row">
            <button id="btn-export" class="btn btn-secondary">📥 Exporteer</button>
            <label class="btn btn-secondary">📤 Importeer
              <input id="file-import" type="file" accept=".json" class="hidden">
            </label>
            <button id="btn-reset-stats" class="btn btn-secondary">🔄 Reset voortgang</button>
          </div>
        </div>
        <div id="manage-subjects-list" class="manage-subjects-list"></div>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
